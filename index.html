<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青春纪念册 · 毕业时光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            margin: 40px 0;
            animation: fadeIn 1s ease;
        }

        .main-title {
            font-size: 36px;
            color: #ff5e62;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(255,94,98,0.2);
        }

        .sub-title {
            font-size: 18px;
            color: #666;
        }

        /* 板块样式 */
        .section {
            margin: 60px 0;
            animation: slideUp 0.8s ease-out;
        }

        .section-title {
            font-size: 24px;
            color: #fff;
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            padding: 12px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(255,154,158,0.3);
        }

        /* 图片网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 4px solid white;
        }

        .gallery img:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        /* 放大查看 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        .modal-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            border: 5px solid white;
        }

        .close {
            position: absolute;
            top: 30px;
            right: 35px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close:hover {
            color: #ff5e62;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1 class="main-title">✨ 青春纪念册 ✨</h1>
        <p class="sub-title">以梦为马，不负韶华 · 我们的毕业时光</p>
    </div>

    <!-- 封面 -->
    <div class="section" align="center">
        <h2 class="section-title">📘 封面系列</h2>
        <div class="gallery" id="cover"></div>
    </div>

    <!-- 内页 -->
    <div class="section" align="center">
        <h2 class="section-title">📗 内页系列</h2>
        <div class="gallery" id="inner"></div>
    </div>

    <!-- 个性页 -->
    <div class="section" align="center">
        <h2 class="section-title">📙 个性页系列</h2>
        <div class="gallery" id="special"></div>
    </div>

    <!-- 放大弹窗 -->
    <div class="modal" id="modal">
        <span class="close">&times;</span>
        <img class="modal-img" id="showImg">
    </div>

    <script>
        // 自动生成 1-44 张图片
        function loadImages(prefix, containerId) {
            const box = document.getElementById(containerId);
            for (let i = 1; i <= 44; i++) {
                const img = new Image();
                img.src = `${prefix}_${i}.jpg`;
                img.alt = `第${i}页`;
                img.onclick = () => {
                    document.getElementById("modal").style.display = "flex";
                    document.getElementById("showImg").src = img.src;
                };
                box.appendChild(img);
            }
        }

        // 加载三类图片
        loadImages("封面_批量发片", "cover");
        loadImages("内页_批量发片", "inner");
        loadImages("个性页_批量发片", "special");

        // 关闭放大
        document.querySelector(".close").onclick = () => {
            document.getElementById("modal").style.display = "none";
        };

        document.getElementById("modal").onclick = (e) => {
            if (e.target === document.getElementById("modal")) {
                document.getElementById("modal").style.display = "none";
            }
        };
    </script>
</body>
</html>
