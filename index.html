<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业纪念册 - 完整画册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .title {
            font-size: 28px;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(173, 216, 230, 0.8);
        }

        .section {
            margin: 50px 0;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: #ffdf80;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .gallery img {
            width: 180px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        /* 点击放大 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid white;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 class="title">青春纪念册 · 完整电子版</h1>

    <!-- 封面部分 1-44 张 -->
    <div class="section">
        <h2 class="section-title">📘 封面系列（共44页）</h2>
        <div class="gallery" id="cover"></div>
    </div>

    <!-- 内页部分 1-44 张 -->
    <div class="section">
        <h2 class="section-title">📗 内页系列（共44页）</h2>
        <div class="gallery" id="inner"></div>
    </div>

    <!-- 个性页部分 1-44 张 -->
    <div class="section">
        <h2 class="section-title">📙 个性页系列（共44页）</h2>
        <div class="gallery" id="special"></div>
    </div>

    <!-- 点击放大弹窗 -->
    <div class="modal" id="modal">
        <span class="close">&times;</span>
        <img id="modal-img">
    </div>

    <script>
        // 自动生成 1~44 张图片
        function loadImages(prefix, containerId) {
            const container = document.getElementById(containerId);
            for (let i = 1; i <= 44; i++) {
                const img = document.createElement("img");
                img.src = `${prefix}_${i}.jpg`;
                img.alt = `${prefix} 第${i}页`;
                img.onclick = () => openModal(img.src);
                container.appendChild(img);
            }
        }

        // 加载三个系列图片
        loadImages("封面_批量发片", "cover");
        loadImages("内页_批量发片", "inner");
        loadImages("个性页_批量发片", "special");

        // 放大查看功能
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modal-img");

        function openModal(src) {
            modal.style.display = "flex";
            modalImg.src = src;
        }

        document.querySelector(".close").onclick = () => {
            modal.style.display = "none";
        };

        modal.onclick = (e) => {
            if (e.target === modal) modal.style.display = "none";
        };
    </script>
</body>
</html>
