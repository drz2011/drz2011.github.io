<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2023级九班 · 青春纪念册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        /* 验证界面 */
        .verify-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fcb69f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .verify-title {
            font-size: 28px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        #sloganInput {
            width: 100%;
            max-width: 450px;
            padding: 14px 20px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            outline: none;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .verify-btn {
            margin-top: 20px;
            padding: 12px 40px;
            background: #ff5e62;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,94,98,0.3);
            transition: 0.3s;
        }

        .verify-btn:hover {
            background: #ff3b3f;
            transform: scale(1.05);
        }

        #tip {
            margin-top: 15px;
            color: #fff;
            font-size: 14px;
        }

        /* 主内容默认隐藏 */
        .content {
            display: none;
        }

        /* 主页面样式 */
        .header {
            text-align: center;
            margin: 40px 0;
            animation: fadeIn 1s ease;
        }

        .main-title {
            font-size: 36px;
            color: #ff5e62;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(255,94,98,0.2);
        }

        .sub-title {
            font-size: 18px;
            color: #666;
        }

        .section {
            margin: 60px 0;
            animation: slideUp 0.8s ease-out;
        }

        .section-title {
            font-size: 24px;
            color: #fff;
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            padding: 12px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(255,154,158,0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 4px solid white;
        }

        .gallery img:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        /* 放大查看 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        .modal-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            border: 5px solid white;
        }

        .close {
            position: absolute;
            top: 30px;
            right: 35px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close:hover {
            color: #ff5e62;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body>

<!-- 验证页面 -->
<div class="verify-box" id="verifyBox">
    <h2 class="verify-title">2023级九班 · 安全验证</h2>
    <input type="text" id="sloganInput" placeholder="请输入班级口号" autocomplete="off">
    <button class="verify-btn" onclick="checkSlogan()">确认进入</button>
    <div id="tip"></div>
</div>

<!-- 主内容 -->
<div class="content" id="mainContent">
    <div class="header">
        <h1 class="main-title">✨ 青春纪念册 ✨</h1>
        <p class="sub-title">以梦为马，不负韶华 · 我们的毕业时光</p>
    </div>

    <!-- 所有图片：assets/images/0.JPG ~ 43.JPG -->
    <div class="section" align="center">
        <h2 class="section-title">📘 纪念册系列</h2>
        <div class="gallery" id="gallery"></div>
    </div>

    <!-- 放大弹窗 -->
    <div class="modal" id="modal">
        <span class="close">&times;</span>
        <img class="modal-img" id="showImg">
    </div>
</div>

<script>
// 验证口号
function checkSlogan() {
    const input = document.getElementById("sloganInput").value.trim();
    const answer = "砥砺前行，勇攀高峰，九天揽月，志在星辰";
    const tip = document.getElementById("tip");

    if (input === answer) {
        document.getElementById("verifyBox").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        tip.innerText = "口号不正确，请重新输入！";
        tip.style.color = "#ff3b3f";
    }
}

// 回车提交
document.getElementById("sloganInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkSlogan();
});

// 加载所有图片（assets/images/0.JPG ~ 43.JPG）
function loadImages() {
    const box = document.getElementById("gallery");
    for (let i = 0; i < 44; i++) {
        const img = new Image();
        img.src = `assets/images/${i}.jpg`;
        img.alt = `第${i + 1}页`;
        img.onclick = () => {
            document.getElementById("modal").style.display = "flex";
            document.getElementById("showImg").src = img.src;
        };
        box.appendChild(img);
    }
}

// 关闭大图
document.querySelector(".close").onclick = () => {
    document.getElementById("modal").style.display = "none";
};
document.getElementById("modal").onclick = (e) => {
    if (e.target === document.getElementById("modal")) {
        document.getElementById("modal").style.display = "none";
    }
};

// 页面加载时自动加载所有图片
window.onload = function() {
    loadImages();
};
</script>
</body>
</html>
